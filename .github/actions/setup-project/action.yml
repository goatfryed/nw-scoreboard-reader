name: 'Setup Scoreboard Reader Project'
description: 'Checks out, validates config, sets up Node, pnpm caching, installs system and Node dependencies'
inputs:
  mode:
    description: 'Processing Mode'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Validate Mode Configuration
      shell: bash
      run: |
        CONFIG_FILE="config.${{ inputs.mode }}.json"
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "Error: Configuration file $CONFIG_FILE does not exist."
          exit 1
        fi

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Cache APT packages
      uses: actions/cache@v5
      id: apt-cache
      with:
        path: ${{ github.workspace }}/.apt-cache
        key: ${{ runner.os }}-apt-ffmpeg-poppler-utils
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install System Dependencies
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/.apt-cache
        
        # Copy cached deb files to apt folder if any exist
        if [ -d "${{ github.workspace }}/.apt-cache" ] && [ "$(ls -A ${{ github.workspace }}/.apt-cache)" ]; then
          sudo cp ${{ github.workspace }}/.apt-cache/*.deb /var/cache/apt/archives/
        fi
        
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends ffmpeg poppler-utils
        
        # Save newly downloaded packages back to our workspace cache
        sudo cp /var/cache/apt/archives/*.deb ${{ github.workspace }}/.apt-cache/ || true
        sudo chown -R $USER ${{ github.workspace }}/.apt-cache

    - name: Install Node Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
